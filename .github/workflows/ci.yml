name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=security_gate --cov-report=term-missing --cov-report=xml

      - name: Run bandit
        run: bandit -r security_gate/ -ll -q

      - name: Run ruff
        run: ruff check security_gate/ tests/

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security-gate
        run: |
          pip install -e .

      - name: Run security-gate against itself
        run: security-gate scan . --output json --save --no-exit-code

      - name: Upload gate report
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-report
          path: security-gate-report.json
